<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Channel — Felix Bell</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Metamorphous&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header"></header>

  <!-- Channel title bar -->
  <div class="channel-title-bar">
    <h1 class="channel-title" id="channel-title">Loading…</h1>
    <a href="index.html" class="back-link" id="back-link">← back</a>
  </div>

  <!-- Mosaic grid -->
  <div class="blocks-grid" id="blocks-grid"></div>

  <div class="load-more-wrap" id="load-more-wrap" style="display:none">
    <button class="load-more-btn" id="load-more-btn">Load more</button>
  </div>

  <!-- Ticker bar -->
  <div class="ticker-bar" id="ticker-bar" aria-label="Status" style="display:none">
    <div class="ticker-row ticker-row--working">
      <span class="ticker-label">currently working on</span>
      <div class="ticker-scroll" id="ticker-working"></div>
    </div>
    <div class="ticker-row ticker-row--want">
      <span class="ticker-label">would like to work on</span>
      <div class="ticker-scroll" id="ticker-want"></div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer" style="display:none">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">×</button>
    <button class="lightbox-arrow lightbox-arrow--prev" id="lightbox-prev" aria-label="Previous image">←</button>
    <button class="lightbox-arrow lightbox-arrow--next" id="lightbox-next" aria-label="Next image">→</button>
    <div class="lightbox-inner">
      <img id="lightbox-img" src="" alt="" class="lightbox-img" />
      <div class="lightbox-meta" id="lightbox-meta" style="display:none">
        <span class="lightbox-title" id="lightbox-title"></span>
        <span class="lightbox-date" id="lightbox-date"></span>
      </div>
    </div>
  </div>

  <script>
    // Back button: go to previous page if available, else home
    const backLink = document.getElementById('back-link');
    if (backLink && history.length > 1) {
      backLink.addEventListener('click', function(e) {
        e.preventDefault();
        history.back();
      });
    }
  </script>
  <script src="header.js"></script>
  <script src="theme.js"></script>
  <script src="ticker.js"></script>
  <script src="channel.js"></script>
</body>
</html>
