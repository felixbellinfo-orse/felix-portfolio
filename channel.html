<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Channel — Felix Bell</title>
  <meta name="description" content="Felix Bell — Are.na channel" />

  <link href="https://api.fontshare.com/v2/css?f[]=boska@400,500,700&display=swap" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300..600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <a href="index.html" class="site-title">Felix Bell</a>
    <nav class="site-nav">
      <button data-theme-toggle aria-label="Switch theme" class="theme-toggle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </nav>
  </header>

  <!-- Ticker bar -->
  <div class="ticker-bar" id="ticker-bar" aria-label="Status" style="display:none">
    <div class="ticker-row ticker-row--working">
      <span class="ticker-label">currently working on</span>
      <div class="ticker-scroll" id="ticker-working"></div>
    </div>
    <div class="ticker-row ticker-row--want">
      <span class="ticker-label">would like to work on</span>
      <div class="ticker-scroll" id="ticker-want"></div>
    </div>
  </div>

  <main>
    <div class="channel-header" id="channel-header">
      <a href="index.html" class="back-link">← back</a>
      <h1 class="channel-title" id="channel-title">Loading…</h1>
      <p class="channel-meta" id="channel-meta"></p>
      <div class="channel-appears-in" id="channel-appears-in" style="display:none">
        <span class="appears-in-label">This channel appears in</span>
        <div class="appears-in-links" id="appears-in-links"></div>
      </div>
    </div>

    <div class="blocks-grid" id="blocks-grid">
      <!-- blocks loaded dynamically -->
    </div>

    <div class="load-more-wrap" id="load-more-wrap" style="display:none">
      <button class="load-more-btn" id="load-more-btn">Load more</button>
    </div>
  </main>

  <footer class="site-footer">
    <p>Felix Bell — Rotterdam<br>
    <a href="mailto:felixbell.info@gmail.com">felixbell.info@gmail.com</a></p>

  </footer>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer" style="display:none">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">×</button>
    <div class="lightbox-inner">
      <img class="lightbox-img" id="lightbox-img" src="" alt="" />
      <div class="lightbox-caption" id="lightbox-caption"></div>
    </div>
  </div>

  <script src="theme.js"></script>
  <script src="ticker.js"></script>
  <script src="channel.js"></script>
</body>
</html>
