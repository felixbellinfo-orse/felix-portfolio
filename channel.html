<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Channel — Felix Bell</title>

  <link href="https://api.fontshare.com/v2/css?f[]=boska@400,500,700&display=swap" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300..600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <a href="index.html" class="info-item info-name">Felix Bell</a>
    <span class="info-item">Sound &amp; Space</span>
    <span class="info-item">Rotterdam</span>
    <a href="tel:+31612345678" class="info-item">+31 6 1234 5678</a>
    <a href="mailto:felixbell.info@gmail.com" class="info-item">felixbell.info@gmail.com</a>
    <div class="info-right">
      <a href="about.html" class="info-item info-about">About</a>
      <button data-theme-toggle aria-label="Switch theme" class="theme-toggle">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <!-- Channel title bar -->
  <div class="channel-title-bar">
    <a href="index.html" class="back-link">← back</a>
    <h1 class="channel-title" id="channel-title">Loading…</h1>
  </div>

  <!-- Mosaic grid -->
  <div class="blocks-grid" id="blocks-grid"></div>

  <div class="load-more-wrap" id="load-more-wrap" style="display:none">
    <button class="load-more-btn" id="load-more-btn">Load more</button>
  </div>

  <!-- Ticker bar -->
  <div class="ticker-bar" id="ticker-bar" aria-label="Status" style="display:none">
    <div class="ticker-row ticker-row--working">
      <span class="ticker-label">currently working on</span>
      <div class="ticker-scroll" id="ticker-working"></div>
    </div>
    <div class="ticker-row ticker-row--want">
      <span class="ticker-label">would like to work on</span>
      <div class="ticker-scroll" id="ticker-want"></div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer" style="display:none">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">×</button>
    <button class="lightbox-arrow lightbox-arrow--prev" id="lightbox-prev" aria-label="Previous image">←</button>
    <button class="lightbox-arrow lightbox-arrow--next" id="lightbox-next" aria-label="Next image">→</button>
    <div class="lightbox-inner">
      <img id="lightbox-img" src="" alt="" class="lightbox-img" />
      <div class="lightbox-meta" id="lightbox-meta" style="display:none">
        <span class="lightbox-title" id="lightbox-title"></span>
        <span class="lightbox-date" id="lightbox-date"></span>
      </div>
    </div>
  </div>

  <script src="theme.js"></script>
  <script src="ticker.js"></script>
  <script src="channel.js"></script>
</body>
</html>
