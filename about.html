<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About — Felix Bell</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header"></header>

  <main class="about-main">
    <div class="about-content">
      <p class="about-bio">
        Write something about yourself here.
      </p>
    </div>
  </main>

  <!-- Ticker bar -->
  <div class="ticker-bar" id="ticker-bar" aria-label="Status" style="display:none">
    <div class="ticker-row ticker-row--working">
      <span class="ticker-label">currently working on</span>
      <div class="ticker-scroll" id="ticker-working"></div>
    </div>
    <div class="ticker-row ticker-row--want">
      <span class="ticker-label">would like to work on</span>
      <div class="ticker-scroll" id="ticker-want"></div>
    </div>
  </div>

  <script src="header.js"></script>
  <script src="theme.js"></script>
  <script src="ticker.js"></script>
</body>
</html>
