<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Felix Bell</title>
  <meta name="description" content="Felix Bell — speaker designer and artist based in Rotterdam." />
  <meta property="og:title" content="Felix Bell" />
  <meta property="og:description" content="Speaker designer and artist based in Rotterdam." />
  <meta property="og:type" content="website" />

  <!-- Fonts: Boska (display) + Work Sans (body) -->
  <link href="https://api.fontshare.com/v2/css?f[]=boska@400,500,700&display=swap" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300..600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <a href="index.html" class="site-title">Felix Bell</a>
    <nav class="site-nav">
      <button data-theme-toggle aria-label="Switch theme" class="theme-toggle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </nav>
  </header>

  <!-- Ticker bar -->
  <div class="ticker-bar" id="ticker-bar" aria-label="Status" style="display:none">
    <div class="ticker-row ticker-row--working">
      <span class="ticker-label">currently working on</span>
      <div class="ticker-scroll" id="ticker-working"></div>
    </div>
    <div class="ticker-row ticker-row--want">
      <span class="ticker-label">would like to work on</span>
      <div class="ticker-scroll" id="ticker-want"></div>
    </div>
  </div>

  <!-- Filter toggles -->
  <div class="filters-bar" id="filters-bar">
    <div class="filter-btns" id="channel-filters" style="display:none" role="group" aria-label="Filter by category"></div>
  </div>

  <main>
    <section class="channels-section">
      <div class="channels-grid" id="channels-grid">
        <!-- channels loaded dynamically -->
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>Felix Bell — Rotterdam<br>
    <a href="mailto:felixbell.info@gmail.com">felixbell.info@gmail.com</a></p>

  </footer>

  <script src="theme.js"></script>
  <script src="ticker.js"></script>
  <script src="channels.js"></script>
</body>
</html>
